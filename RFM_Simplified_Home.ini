[custom]
; RFM_Simplified_Home.ini - 精简版配置 (家庭网络版)
; 2026.2.2 优化：广告置顶、AI动态规则、故障转移、AI仅用美国节点
ipv6=false

; === 规则优先级：从上到下匹配 ===

; 0. HOME 本地网络
ruleset=🏠HOME,[]IP-CIDR,10.11.12.0/24

; 1. 广告拦截（置顶）
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/classical/ad_all.list

; 2. 直连规则
ruleset=🎯 全球直连,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/classical/direct_all.list
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Accademia/Additional_Rule_For_Clash@latest/ChinaMax/ChinaMax_Domain.yaml
ruleset=🎯 全球直连,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/geoip/cn_ip.mrs

; 3. AI 服务（动态更新）
ruleset=🧬 OpenAi,https://github.com/DustinWin/ruleset_geodata/releases/download/clash-ruleset/ai.yaml

; 4. 流媒体（Disney+、Apple TV+、Netflix、TVB）
ruleset=🎬 流媒体,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/classical/disney.list
ruleset=🎬 流媒体,[]DOMAIN-SUFFIX,tv.apple.com
ruleset=🎬 流媒体,[]DOMAIN,np-edge.itunes.apple.com
ruleset=🎬 流媒体,[]DOMAIN,play-edge.itunes.apple.com
ruleset=🎬 流媒体,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/geosite/netflix_domain.mrs
ruleset=🎬 流媒体,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/custom/tvb.list

; 5. 谷歌服务（YouTube/Google/Gemini）- 使用.list格式，.mrs格式subconverter不支持
ruleset=🍀 谷歌服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🍀 谷歌服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=🍀 谷歌服务,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/custom/google_custom.list

; 6. 开发专用（GitHub/npm/Docker/PyPI等）
ruleset=💻 开发专用,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list
ruleset=💻 开发专用,[]DOMAIN-SUFFIX,npmjs.org
ruleset=💻 开发专用,[]DOMAIN-SUFFIX,npmjs.com
ruleset=💻 开发专用,[]DOMAIN-SUFFIX,docker.io
ruleset=💻 开发专用,[]DOMAIN-SUFFIX,docker.com
ruleset=💻 开发专用,[]DOMAIN-SUFFIX,pypi.org
ruleset=💻 开发专用,[]DOMAIN-SUFFIX,stackoverflow.com

; 7. 常用服务
ruleset=🚀 节点选择,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/geosite/telegram_domain.mrs
ruleset=🚀 节点选择,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/geosite/microsoft_domain.mrs

; 6. 国际流量兜底
ruleset=🚀 节点选择,https://raw.githubusercontent.com/bendusy/RulesForMe/main/rulesets/geosite/gfw_domain.mrs

; 7. 最终匹配
ruleset=🎯 全球直连,[]GEOIP,LAN
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; === 代理组定义 ===
; 1. 基础节点组
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|Hong Kong)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美|US|United States)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|SG|Singapore)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🏠HOME`url-test`(home|HOME)`http://cp.cloudflare.com/generate_204`300,,50

; 2. 故障转移组
custom_proxy_group=🆘 故障转移`fallback`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`http://cp.cloudflare.com/generate_204`300,,50

; 3. 主选择组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🆘 故障转移`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]DIRECT

; 4. 服务分流组
; AI服务：仅使用美国节点
custom_proxy_group=🧬 OpenAi`url-test`(美|US|United States|洛杉矶|达拉斯|纽约|西雅图|旧金山|LAX|SJC|SEA)^(?!.*(港|HK|Hong Kong))`https://chatgpt.com/favicon.ico`600,,50
; 谷歌服务：美国+新加坡（排除香港）
custom_proxy_group=🍀 谷歌服务`url-test`(美|US|United States|新加坡|SG|Singapore)^(?!.*(港|HK|Hong Kong))`http://cp.cloudflare.com/generate_204`300,,50
; 开发专用：美国+新加坡（排除香港）
custom_proxy_group=💻 开发专用`url-test`(美|US|United States|新加坡|SG|Singapore)^(?!.*(港|HK|Hong Kong))`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🎬 流媒体`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🆘 故障转移`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true


