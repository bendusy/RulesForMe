[custom]
; pair.ini - 基于 pair.yaml 转换的 subconverter 配置
; 规则集来源与 pair.yaml 完全一致（保留.mrs格式）
; 2026.2.3 精简版：地区只保留港/美/新，AI只保留OpenAI/Gemini
ipv6=false

; =============================== 规则设置 ===============================

; 1. 广告拦截
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml

; 2. 直连规则
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Accademia/Additional_Rule_For_Clash@latest/ChinaMax/ChinaMax_Domain.yaml
ruleset=🎯 全球直连,[]GEOIP,CN

; 3. Telegram
ruleset=📲 电报信息,https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/telegramip.mrs

; 4. OpenAI（仅美国节点）
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,openai.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=🤖 OpenAI,[]DOMAIN-KEYWORD,openai
ruleset=🤖 OpenAI,[]DOMAIN-KEYWORD,chatgpt
ruleset=🤖 OpenAI,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/ai.mrs
ruleset=🤖 OpenAI,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cloudflare.mrs

; 5. Gemini（排除香港）
ruleset=🧪 Gemini,[]DOMAIN-SUFFIX,aistudio.google.com
ruleset=🧪 Gemini,[]DOMAIN-SUFFIX,gemini.google.com
ruleset=🧪 Gemini,[]DOMAIN-KEYWORD,aistudio
ruleset=🧪 Gemini,[]DOMAIN-KEYWORD,generativeai
ruleset=🧪 Gemini,[]DOMAIN-KEYWORD,gemini

; 6. 流媒体
ruleset=📹 YouTube,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs
ruleset=🎵 TikTok,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.mrs
ruleset=🎥 Netflix,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs
ruleset=🏰 Disney+,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/disney.mrs

; 7. GFW + Proxy 兜底
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs
ruleset=🚀 节点选择,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/proxy.mrs

; 8. 最终匹配
ruleset=🎯 全球直连,[]GEOIP,LAN
ruleset=🐟 漏网之鱼,[]FINAL

; =============================== 代理组设置 ===============================

; --- 地区节点（只保留港/美/新）---
custom_proxy_group=🇭🇰 香港节点`url-test`(香港|HK|Hong Kong)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇺🇸 美国节点`url-test`(美国|US|United States|洛杉矶|达拉斯|纽约|西雅图|旧金山)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|SG|Singapore|狮城)`http://cp.cloudflare.com/generate_204`180,,15

; --- 自动选择 ---
custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50

; --- 故障转移 ---
custom_proxy_group=🆘 故障转移`fallback`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`http://cp.cloudflare.com/generate_204`300,,50

; --- 主选择组 ---
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🆘 故障转移`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]DIRECT

; --- AI（只保留OpenAI和Gemini）---
; OpenAI：仅美国节点
custom_proxy_group=🤖 OpenAI`url-test`(美国|US|United States|洛杉矶|达拉斯|纽约|西雅图|旧金山)`https://chatgpt.com/favicon.ico`600,,50
; Gemini：美国+新加坡（排除香港）
custom_proxy_group=🧪 Gemini`url-test`(美国|US|新加坡|SG)`http://cp.cloudflare.com/generate_204`300,,50

; --- 流媒体 ---
custom_proxy_group=📹 YouTube`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🚀 节点选择
custom_proxy_group=🎥 Netflix`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🚀 节点选择
custom_proxy_group=🏰 Disney+`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🚀 节点选择

; --- 常用服务 ---
custom_proxy_group=📲 电报信息`select`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🚀 节点选择`[]DIRECT

; --- 系统组 ---
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🆘 故障转移`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
