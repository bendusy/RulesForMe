[custom]
; pair.ini - 基于 pair.yaml 转换的 subconverter 配置
; 特点：完整的AI专项、区域均衡加速、故障转移、流媒体分流
; 2026.2.3 创建
ipv6=false

; =============================== 规则设置 ===============================
; 规则按优先级从上到下匹配

; 1. 广告拦截（最高优先级）
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/BanAD.list

; 2. 直连规则（中国域名/IP）
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Accademia/Additional_Rule_For_Clash@latest/ChinaMax/ChinaMax_Domain.yaml
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,[]GEOIP,CN

; 3. OpenAI 专项（美国节点优先，排除香港）
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,openai.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=🤖 OpenAI,[]DOMAIN-KEYWORD,openai
ruleset=🤖 OpenAI,[]DOMAIN-KEYWORD,chatgpt

; 4. Google AISTudio 专项（排除香港）
ruleset=🧪 AISTudio,[]DOMAIN-SUFFIX,aistudio.google.com
ruleset=🧪 AISTudio,[]DOMAIN-KEYWORD,aistudio
ruleset=🧪 AISTudio,[]DOMAIN-KEYWORD,generativeai

; 5. AI 通用规则（DustinWin AI规则集）
ruleset=🤖 AI,https://github.com/DustinWin/ruleset_geodata/releases/download/clash-ruleset/ai.yaml

; 6. 流媒体专项
; YouTube
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
; TikTok
ruleset=🎵 TikTok,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list
; Netflix
ruleset=🎥 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
; Disney+
ruleset=🏰 Disney+,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/DisneyHMT.list
; Instagram（排除港新）
ruleset=📸 Instagram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Instagram.list

; 7. Telegram
ruleset=📲 电报信息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Telegram.list

; 8. 谷歌服务
ruleset=🍀 谷歌服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list

; 9. 微软服务
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Microsoft.list

; 10. GitHub
ruleset=💻 GitHub,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list

; 11. Cloudflare（AI相关IP）
ruleset=☁️ Cloudflare,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Cloudflare.list

; 12. GFW 兜底
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list

; 13. 最终匹配
ruleset=🎯 全球直连,[]GEOIP,LAN
ruleset=🐟 漏网之鱼,[]FINAL

; =============================== 代理组设置 ===============================

; --- 基础节点组（使用正则筛选节点）---
custom_proxy_group=🇹🇼 台湾均衡`url-test`(台湾|TW|Taiwan|新北|台中|台北)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇭🇰 香港均衡`url-test`(香港|HK|Hong Kong)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇺🇸 美国均衡`url-test`(美国|US|United States|洛杉矶|达拉斯|纽约|西雅图|旧金山)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇸🇬 新加坡均衡`url-test`(新加坡|SG|Singapore|狮城)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇯🇵 日本均衡`url-test`(日本|JP|Japan|东京|大阪)`http://cp.cloudflare.com/generate_204`180,,15

; --- 故障转移组 ---
custom_proxy_group=🆘 故障转移`fallback`[]♻️ 自动选择`[]🇭🇰 香港均衡`[]🇺🇸 美国均衡`[]🇸🇬 新加坡均衡`[]🇯🇵 日本均衡`http://cp.cloudflare.com/generate_204`300,,50

; --- 自动选择组 ---
custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50

; --- 主选择组 ---
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🆘 故障转移`[]🇹🇼 台湾均衡`[]🇭🇰 香港均衡`[]🇺🇸 美国均衡`[]🇸🇬 新加坡均衡`[]🇯🇵 日本均衡`[]DIRECT

; --- AI 专项组（排除香港，防封）---
; OpenAI：仅美国节点
custom_proxy_group=🤖 OpenAI`url-test`(美国|US|United States|洛杉矶|达拉斯|纽约|西雅图|旧金山|LAX|SJC|SEA)^(?!.*(港|HK|Hong Kong))`https://chatgpt.com/favicon.ico`600,,50
; AISTudio：美国+新加坡+日本（排除香港）
custom_proxy_group=🧪 AISTudio`url-test`(美|US|新加坡|SG|日本|JP)^(?!.*(港|HK|Hong Kong))`http://cp.cloudflare.com/generate_204`600,,50
; AI 通用
custom_proxy_group=🤖 AI`select`[]🤖 OpenAI`[]🧪 AISTudio`[]🇺🇸 美国均衡`[]🇸🇬 新加坡均衡`[]🇯🇵 日本均衡

; --- 流媒体组 ---
custom_proxy_group=📹 YouTube`select`[]🇹🇼 台湾均衡`[]🇭🇰 香港均衡`[]🇸🇬 新加坡均衡`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]🇺🇸 美国均衡`[]🇹🇼 台湾均衡`[]🇸🇬 新加坡均衡`[]🇯🇵 日本均衡`[]🚀 节点选择
custom_proxy_group=🎥 Netflix`select`[]🇭🇰 香港均衡`[]🇹🇼 台湾均衡`[]🇸🇬 新加坡均衡`[]🇯🇵 日本均衡`[]🚀 节点选择
custom_proxy_group=🏰 Disney+`select`[]🇭🇰 香港均衡`[]🇹🇼 台湾均衡`[]🇸🇬 新加坡均衡`[]🇯🇵 日本均衡`[]🚀 节点选择
; Instagram：排除港新
custom_proxy_group=📸 Instagram`url-test`(美|US|日本|JP|台湾|TW)^(?!.*(港|HK|新加坡|SG))`http://cp.cloudflare.com/generate_204`300,,50

; --- 常用服务组 ---
custom_proxy_group=📲 电报信息`select`[]🇸🇬 新加坡均衡`[]🇭🇰 香港均衡`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🍀 谷歌服务`url-test`(美|US|新加坡|SG)^(?!.*(港|HK))`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🇺🇸 美国均衡`[]🇸🇬 新加坡均衡`[]🚀 节点选择
custom_proxy_group=💻 GitHub`url-test`(美|US|新加坡|SG)^(?!.*(港|HK))`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=☁️ Cloudflare`select`[]🤖 AI`[]🇺🇸 美国均衡`[]🇸🇬 新加坡均衡`[]🚀 节点选择

; --- 系统组 ---
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🆘 故障转移`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT

; --- 区域节点手动选择 ---
custom_proxy_group=🇹🇼 台湾节点`select`(台湾|TW|Taiwan)
custom_proxy_group=🇭🇰 香港节点`select`(香港|HK|Hong Kong)
custom_proxy_group=🇺🇸 美国节点`select`(美国|US|United States)
custom_proxy_group=🇸🇬 新加坡节点`select`(新加坡|SG|Singapore)
custom_proxy_group=🇯🇵 日本节点`select`(日本|JP|Japan)

enable_rule_generator=true
overwrite_original_rules=true
