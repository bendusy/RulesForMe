[custom]
; pair.ini - 基于 pair.yaml 转换的 subconverter 配置
; 规则集来源与 pair.yaml 完全一致（保留.mrs格式）
; 2026.2.3 创建
ipv6=false

; =============================== 规则设置 ===============================
; 规则按优先级从上到下匹配（与 pair.yaml 一致）

; 1. 广告拦截（AWAvenue - pair.yaml:AWAvenue_Ads_Rule）
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml

; 2. 直连规则（pair.yaml:cn_domain + GEOIP CN）
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Accademia/Additional_Rule_For_Clash@latest/ChinaMax/ChinaMax_Domain.yaml
ruleset=🎯 全球直连,[]GEOIP,CN

; 3. Telegram IP（pair.yaml:telegram_ip）
ruleset=📲 电报信息,https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/telegramip.mrs

; 4. Cloudflare IP → AI（pair.yaml:geoip_cloudflare）
ruleset=🤖 AI,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cloudflare.mrs

; 5. OpenAI 规则（与pair.yaml内联规则一致）
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,openai.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=🤖 OpenAI,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=🤖 OpenAI,[]DOMAIN-KEYWORD,openai
ruleset=🤖 OpenAI,[]DOMAIN-KEYWORD,chatgpt

; 6. Google AISTudio 规则（与pair.yaml内联规则一致）
ruleset=🧪 AISTudio,[]DOMAIN-SUFFIX,aistudio.google.com
ruleset=🧪 AISTudio,[]DOMAIN-KEYWORD,aistudio
ruleset=🧪 AISTudio,[]DOMAIN-KEYWORD,generativeai

; 7. AI 通用规则（pair.yaml:ai）
ruleset=🤖 AI,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/ai.mrs

; 8. 流媒体专项（pair.yaml rule-providers，保留.mrs格式）
; YouTube（pair.yaml:youtube_domain）
ruleset=📹 YouTube,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs
; TikTok（pair.yaml:tiktok_domain）
ruleset=🎵 TikTok,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.mrs
; Netflix（pair.yaml:netflix_domain）
ruleset=🎥 Netflix,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs
; Disney+（pair.yaml:disney_domain）
ruleset=🏰 Disney+,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/disney.mrs

; 9. GFW 兜底（pair.yaml:gfw_domain）
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs

; 10. Proxy 兜底（pair.yaml:proxy）
ruleset=🚀 节点选择,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/proxy.mrs

; 11. 最终匹配
ruleset=🎯 全球直连,[]GEOIP,LAN
ruleset=🐟 漏网之鱼,[]FINAL

; =============================== 代理组设置 ===============================
; 与 pair.yaml 的 proxy-groups 对应

; --- 智能均衡测速组（pair.yaml:rtt-lb-template）---
custom_proxy_group=🇹🇼 台湾均衡加速`url-test`(台湾|TW|Taiwan|新北|台中|台北)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇭🇰 香港均衡加速`url-test`(香港|HK|Hong Kong)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇺🇸 美国均衡加速`url-test`(美国|US|United States|洛杉矶|达拉斯|纽约|西雅图|旧金山)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇸🇬 新加坡均衡加速`url-test`(新加坡|SG|Singapore|狮城)`http://cp.cloudflare.com/generate_204`180,,15
custom_proxy_group=🇯🇵 日本均衡加速`url-test`(日本|JP|Japan|东京|大阪)`http://cp.cloudflare.com/generate_204`180,,15

; --- 自动选择组（pair.yaml:"自动选择"）---
custom_proxy_group=自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50

; --- 故障转移组（pair.yaml:"🆘 故障转移"）---
custom_proxy_group=🆘 故障转移`fallback`[]自动选择`[]🇭🇰 香港均衡加速`[]🇺🇸 美国均衡加速`[]🇸🇬 新加坡均衡加速`[]🇯🇵 日本均衡加速`http://cp.cloudflare.com/generate_204`300,,50

; --- ♻️ 自动选择（pair.yaml主选择，fallback模式）---
custom_proxy_group=♻️ 自动选择`fallback`[]自动选择`[]🆘 故障转移`http://cp.cloudflare.com/generate_204`300,,50

; --- 🚀 节点选择（pair.yaml）---
custom_proxy_group=🚀 节点选择`select`[]自动选择`[]🤖 AI`[]🇹🇼 台湾均衡加速`[]🇭🇰 香港均衡加速`[]🇯🇵 日本均衡加速`[]🇺🇸 美国均衡加速`[]🇸🇬 新加坡均衡加速`[]🇹🇼 台湾节点`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🆘 故障转移`[]DIRECT

; --- AI 专项组（pair.yaml）---
custom_proxy_group=🤖 AI`select`[]🤖 AI_稳定节点`[]🤖 AI_自动优选
custom_proxy_group=🤖 AI_稳定节点`fallback`(日本|JP|香港|HK|Singapore|新加坡)`http://cp.cloudflare.com/generate_204`7200,,100
custom_proxy_group=🤖 AI_自动优选`url-test`.*`http://cp.cloudflare.com/generate_204`3600,,50

; --- OpenAI 专项（pair.yaml）---
custom_proxy_group=🤖 OpenAI`select`[]🤖 OpenAI_美国优选`[]🤖 OpenAI_全球优选`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点
custom_proxy_group=🤖 OpenAI_美国优选`url-test`(美国|US|United States|洛杉矶|达拉斯|纽约|西雅图|旧金山)`https://chatgpt.com/favicon.ico`600,,50
custom_proxy_group=🤖 OpenAI_全球优选`url-test`(美国|US|Singapore|新加坡|Japan|日本|Korea|韩国)^(?!.*(香港|HK|HongKong|CN|中国))`https://chatgpt.com/favicon.ico`600,,50

; --- AISTudio（pair.yaml，排除香港）---
custom_proxy_group=🧪 AISTudio`select`[]🇺🇸 美国均衡加速`[]🇸🇬 新加坡均衡加速`[]🇯🇵 日本节点`[]🚀 节点选择

; --- 流媒体组（pair.yaml）---
custom_proxy_group=📹 YouTube`select`[]♻️ 自动选择`[]🚀 节点选择`[]🆘 故障转移`[]自动选择`[]🇹🇼 台湾均衡加速`[]🇭🇰 香港均衡加速`[]🇯🇵 日本均衡加速`[]🇺🇸 美国均衡加速`[]🇸🇬 新加坡均衡加速`[]🇹🇼 台湾节点`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]🇺🇸 美国均衡加速`[]🇹🇼 台湾均衡加速`[]🇸🇬 新加坡均衡加速`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点
custom_proxy_group=🎥 Netflix`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🏰 Disney+`url-test`.*`https://www.disneyplus.com/robots.txt`300,,50
custom_proxy_group=📸 Instagram`url-test`.*^(?!.*(香港|HK|Hong Kong|新加坡|SG|Singapore))`http://cp.cloudflare.com/generate_204`300,,50

; --- 区域节点直选（pair.yaml）---
custom_proxy_group=🇹🇼 台湾节点`select`(台湾|TW|Taiwan)
custom_proxy_group=🇭🇰 香港节点`select`(香港|HK|Hong Kong)
custom_proxy_group=🇺🇸 美国节点`select`(美国|US|United States)
custom_proxy_group=🇸🇬 新加坡节点`select`(新加坡|SG|Singapore)
custom_proxy_group=🇯🇵 日本节点`select`(日本|JP|Japan)
custom_proxy_group=全部节点`select`.*

; --- 常用服务组 ---
custom_proxy_group=📲 电报信息`select`[]🚀 节点选择`[]🇸🇬 新加坡均衡加速`[]🇭🇰 香港均衡加速`[]🎯 全球直连`.*

; --- 系统组 ---
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]♻️ 自动选择`[]🚀 节点选择`[]🆘 故障转移`[]自动选择`[]🇹🇼 台湾均衡加速`[]🇭🇰 香港均衡加速`[]🇯🇵 日本均衡加速`[]🇺🇸 美国均衡加速`[]🇸🇬 新加坡均衡加速`[]🇹🇼 台湾节点`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
