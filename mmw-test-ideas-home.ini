; mmw-test-ideas.ini - Miaomiaowu new template (INI)
; Based on mmw-test-ideas.yaml (geodata-mode + simplified rules)

[custom]
; Rules are matched top-to-bottom

; 1. Custom/Specific Direct
ruleset=🏠HOME,[]IP-CIDR,10.11.12.0/24
ruleset=🔒 国内服务,[]GEOIP,private,no-resolve
ruleset=🔒 国内服务,[]DOMAIN-SUFFIX,nciex.com
ruleset=🔒 国内服务,[]DOMAIN-SUFFIX,wendanai.com
ruleset=🔒 国内服务,[]DOMAIN-SUFFIX,hssq.cc

; 2. Ads
ruleset=🛑 广告拦截,[]GEOSITE,category-ads-all

; 3. AI Services
ruleset=🧬 OpenAi,[]GEOSITE,openai
ruleset=🧬 OpenAi,[]GEOSITE,anthropic
ruleset=🧬 OpenAi,[]DOMAIN-SUFFIX,gemini.google
ruleset=🧬 OpenAi,[]DOMAIN-SUFFIX,bard.google.com
ruleset=🧬 OpenAi,[]DOMAIN-SUFFIX,perplexity.ai
ruleset=🧬 OpenAi,[]DOMAIN-SUFFIX,antigravity-unleash.goog

; 4. Streaming
ruleset=🎬 流媒体,[]GEOSITE,netflix
ruleset=🎬 流媒体,[]GEOSITE,disney
ruleset=🎬 流媒体,[]GEOSITE,hbo
ruleset=🎬 流媒体,[]GEOSITE,hulu
ruleset=🎬 流媒体,[]GEOSITE,youtube

; 5. Cloud Services
ruleset=☁️ 云服务,[]GEOSITE,aws
ruleset=☁️ 云服务,[]GEOSITE,azure
ruleset=☁️ 云服务,[]GEOSITE,digitalocean
ruleset=☁️ 云服务,[]GEOSITE,cloudflare
ruleset=☁️ 云服务,[]GEOSITE,dropbox
ruleset=☁️ 云服务,[]GEOSITE,onedrive

; 6. Global Services
ruleset=🚀 节点选择,[]GEOSITE,telegram
ruleset=🚀 节点选择,[]GEOIP,telegram,no-resolve
ruleset=🚀 节点选择,[]GEOSITE,apple
ruleset=🚀 节点选择,[]GEOSITE,microsoft
ruleset=🚀 节点选择,[]GEOSITE,github

; 7. Domestic / CN
ruleset=🔒 国内服务,[]GEOSITE,cn
ruleset=🔒 国内服务,[]GEOIP,cn,no-resolve

; 8. Proxy Fallback
ruleset=🚀 节点选择,[]GEOSITE,geolocation-!cn

; 9. Final Match
ruleset=🐟 漏网之鱼,[]FINAL

; Proxy groups
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]DIRECT`[]REJECT
custom_proxy_group=♻️ 自动选择`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点
custom_proxy_group=🏠HOME`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=🧬 OpenAi`select`(美|US|United States|新加坡|SG|Singapore)
custom_proxy_group=HK1节点`select`[]🇭🇰 香港节点
custom_proxy_group=🎬 流媒体`select`[]HK1节点`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|hk|Hong Kong)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美|US|United States)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|SG|Singapore)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌏 其他节点`select`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🛑 广告拦截`select`[]REJECT
custom_proxy_group=🔒 国内服务`select`[]DIRECT
custom_proxy_group=☁️ 云服务`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]♻️ 自动选择`[]🚀 节点选择`[]DIRECT

; Required switches
enable_rule_generator=true
overwrite_original_rules=true

; Performance & Geodata Settings (Experimental placement in [custom])
unified-delay=true
tcp-concurrent=true
find-process-mode=strict
geo-auto-update=true
geo-update-interval=24
geodata-loader=standard
geodata-mode=true

; Geodata Sources (Accelerated)
geox-url.geoip="https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
geox-url.geosite="https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
geox-url.mmdb="https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
geox-url.asn="https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
